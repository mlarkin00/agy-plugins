name: Notify active-skills marketplaces

# Installed at .github/workflows/notify-plugin.yml in mlarkin00/agent-skills.
# On any push touching active-skills/**, it pings every marketplace that vendors
# these skills so each re-syncs immediately. Both marketplaces also poll daily
# as a fallback, so this is a latency optimization, not a hard dependency.
#
# Marketplaces pinged (fire a repository_dispatch of type active-skills-updated):
#   - mlarkin00/claude       (Claude Code)
#   - mlarkin00/agy-plugins  (Antigravity)
#
# Auth: secret CLAUDE_REPO_TOKEN — a PAT with `repo` scope covering both
# marketplace repos. A classic repo-scoped PAT owned by mlarkin00 already does;
# no per-marketplace token is needed.
on:
  push:
    branches: [main]
    paths:
      - "active-skills/**"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [mlarkin00/claude, mlarkin00/agy-plugins]
    steps:
      - name: Ping ${{ matrix.repo }} to re-sync
        env:
          TOKEN: ${{ secrets.CLAUDE_REPO_TOKEN }}
          REPO: ${{ matrix.repo }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::warning::CLAUDE_REPO_TOKEN not set — skipping ${REPO}." \
                 "That marketplace's daily poll will still pick up this change."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/dispatches" \
            -d '{"event_type":"active-skills-updated"}')
          echo "${REPO} dispatch HTTP $code"
          # 204 = accepted. Anything else is a real failure worth surfacing.
          [ "$code" = "204" ]
